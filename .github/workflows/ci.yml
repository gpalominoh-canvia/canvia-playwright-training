name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verificar si el proyecto ya existe
        id: check
        run: |
          if [ -f package.json ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Aún no hay package.json. La CI se activará al inicializar el proyecto Playwright."
          fi

      - name: Configurar Node.js
        if: steps.check.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        if: steps.check.outputs.ready == 'true'
        run: npm ci

      - name: Instalar navegadores de Playwright
        if: steps.check.outputs.ready == 'true'
        run: npx playwright install --with-deps

      - name: Ejecutar pruebas E2E
        if: steps.check.outputs.ready == 'true'
        run: npx playwright test

      - name: Publicar reporte
        if: steps.check.outputs.ready == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
